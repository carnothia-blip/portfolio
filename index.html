<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimin Do - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <span>JIMIN DO</span>
            </div>
            <nav class="nav">
                <button class="nav-link active">Work</button>
                <button class="nav-link">About</button>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-text">
                    <h1 class="hero-title">I'm Jimin Do</h1>
                    <div class="hero-badge">
                        <span>UI UX Designer @ Google</span>
                    </div>
                </div>
                <div class="hero-image-container">
                    <div class="hexagon-wrapper">
                        <div class="hexagon-mask">
                            <div class="hexagon-bg"></div>
                            <img src="images/me.jpg" alt="Profile" class="profile-img">
                        </div>
                        <div class="tag tag-ui"><span>UI</span></div>
                        <div class="tag tag-design"><span>Design</span></div>
                        <div class="tag tag-business"><span>Business</span></div>
                        <div class="tag tag-ux"><span>UX</span></div>
                    </div>
                </div>
              
            </div>
        </section>

        <!-- Work Section -->
        <section id="work" class="work-section">
            <div id="project-grid" class="project-grid"></div>
        </section>
    </main>

    <!-- Modal -->
    <div id="project-modal" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-container">
            <button class="modal-close" id="modal-close" aria-label="닫기">&#x2715;</button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
