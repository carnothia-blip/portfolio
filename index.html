<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimin Do - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <span>JIMIN DO</span>
            </div>
            <nav class="nav">
                <button class="nav-link active">Work</button>
                <button class="nav-link">About</button>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-container">
                <!-- Left: Text content -->
                <div class="hero-text">
                    <h1 class="hero-title">I'm Jimin Do</h1>
                    <div class="hero-badge">
                        <span>UI UX Designer @ Google</span>
                    </div>
                </div>

                <!-- Right: Hexagon profile image -->
                <div class="hero-image-container">
                    <div class="hexagon-wrapper">
                        <!-- Hexagon masked image -->
                        <div class="hexagon-mask">
                            <div class="hexagon-bg"></div>
                            <img src="https://www.dummyimg.in/placeholder" alt="Profile" class="profile-img">
                        </div>

                        <!-- Floating tags -->
                        <div class="tag tag-ui">
                            <span>UI</span>
                        </div>
                        <div class="tag tag-design">
                            <span>Design</span>
                        </div>
                        <div class="tag tag-business">
                            <span>Business</span>
                        </div>
                        <div class="tag tag-ux">
                            <span>UX</span>
                        </div>
                    </div>
                </div>

                <!-- Scroll indicator -->
                <div class="scroll-indicator">
                    <img src="https://www.dummyimg.in/placeholder" alt="Scroll down">
                </div>
            </div>
        </section>

        <!-- Work Section -->
        <section id="work" class="work-section">
            <div id="project-grid" class="project-grid">
                <!-- Projects will be injected here by JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
